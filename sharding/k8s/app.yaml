apiVersion: v1
kind: Service
metadata:
  name: sharding-app
spec:
  type: NodePort
  selector:
    app: sharding-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sharding-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sharding-app
  template:
    metadata:
      labels:
        app: sharding-app
    spec:
      initContainers:
      - name: wait-for-pg-0
        image: postgres:15-alpine
        command: ['sh', '-c', 'until pg_isready -h pg-shard-0 -p 5432; do echo waiting for pg-shard-0; sleep 2; done;']
      - name: wait-for-pg-1
        image: postgres:15-alpine
        command: ['sh', '-c', 'until pg_isready -h pg-shard-1 -p 5432; do echo waiting for pg-shard-1; sleep 2; done;']
      containers:
      - name: sharding-app
        image: sharding-app:latest
        imagePullPolicy: Never # Crucial for KIND to use the locally loaded image
        env:
        - name: SHARD_0_HOST
          value: pg-shard-0
        - name: SHARD_1_HOST
          value: pg-shard-1
        # In K8s, both services are just listening on their internal port 5432!
        - name: SHARD_PORT
          value: "5432"
        - name: SHARD_1_PORT
          value: "5432"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10

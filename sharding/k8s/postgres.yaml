apiVersion: v1
kind: Service
metadata:
  name: pg-shard-0
spec:
  selector:
    app: pg-shard-0
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pg-shard-0
spec:
  selector:
    matchLabels:
      app: pg-shard-0
  template:
    metadata:
      labels:
        app: pg-shard-0
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: POSTGRES_DB
          value: ds_0
        ports:
        - containerPort: 5432
---

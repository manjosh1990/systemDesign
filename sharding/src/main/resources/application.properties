spring:
  application:
    name: db-sharding-example

# ==========================================
# 1. ShardingSphere & Spring Data Config
# ==========================================
spring.datasource.driver-class-name=org.apache.shardingsphere.driver.ShardingSphereDriver
spring.datasource.url=jdbc:shardingsphere:classpath:shardingsphere.yaml?placeholder-type=environment

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Enable Actuator Probes
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Disable default Flyway so it doesn't run against the virtual driver
spring.flyway.enabled=false

# ==========================================
# 2. Custom Flyway Migration Targets
# ==========================================
app.migration.shards[0].name=Shard 0
app.migration.shards[0].url=jdbc:postgresql://${SHARD_0_HOST:localhost}:${SHARD_PORT:5432}/${SHARD_0_DB:ds_0}
app.migration.shards[0].username=${DB_USERNAME:postgres}
app.migration.shards[0].password=${DB_PASSWORD:password}

app.migration.shards[1].name=Shard 1
app.migration.shards[1].url=jdbc:postgresql://${SHARD_1_HOST:localhost}:${SHARD_1_PORT:5433}/${SHARD_1_DB:ds_1}
app.migration.shards[1].username=${DB_USERNAME:postgres}
app.migration.shards[1].password=${DB_PASSWORD:password}

# ==========================================
# 3. Swagger UI Customization
# ==========================================
# Change the default URL to /api-docs (Optional)
springdoc.swagger-ui.path=/api-docs
# Collapse all operations by default for a cleaner look
springdoc.swagger-ui.doc-expansion=none
# Sort HTTP methods logically (DELETE at bottom, GET at top)
springdoc.swagger-ui.operations-sorter=method
# Sort tags alphabetically
springdoc.swagger-ui.tags-sorter=alpha
# Disable the Swagger top bar search field
springdoc.swagger-ui.disable-swagger-default-url=true
# Inject a custom CSS stylesheet for theming (Dark Mode)
springdoc.swagger-ui.custom-css-url=/custom-swagger.css